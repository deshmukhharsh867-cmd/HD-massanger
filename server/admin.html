<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HD Messenger — Admin</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#0f1117;color:#e8edf5;min-height:100vh}
  #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;
    background:radial-gradient(ellipse at 30% 40%,rgba(124,92,191,.15),transparent 60%),
               radial-gradient(ellipse at 70% 70%,rgba(232,67,147,.1),transparent 60%),#0f1117}
  .login-card{background:#1a1f35;border:1.5px solid #2a3050;border-radius:20px;padding:40px 36px;
    width:100%;max-width:380px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .login-logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#7c5cbf,#e84393);
    display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;
    color:white;margin:0 auto 20px;letter-spacing:-1px}
  .login-title{font-size:22px;font-weight:900;margin-bottom:6px}
  .login-sub{font-size:13px;color:#7a8fa6;margin-bottom:28px}
  .login-input{width:100%;background:#0f1117;border:1.5px solid #2a3050;border-radius:10px;
    padding:12px 16px;color:#e8edf5;font-size:14px;margin-bottom:12px;transition:border-color .15s;font-family:inherit}
  .login-input:focus{outline:none;border-color:#7c5cbf}
  .login-btn{width:100%;background:linear-gradient(135deg,#7c5cbf,#e84393);color:white;border:none;
    border-radius:10px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;
    transition:filter .15s;font-family:inherit}
  .login-btn:hover{filter:brightness(1.1)}
  .login-error{background:rgba(220,53,69,.1);border:1px solid rgba(220,53,69,.3);color:#dc3545;
    border-radius:8px;padding:10px;font-size:13px;margin-bottom:12px;display:none}
  .login-hint{font-size:11px;color:#2a3050;margin-top:16px}
  #adminPanel{display:none}
  .top{background:linear-gradient(135deg,#7c5cbf,#e84393);padding:16px 32px;display:flex;align-items:center;gap:16px}
  .top-logo{width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.2);
    display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:white;flex-shrink:0}
  .top h1{font-size:18px;font-weight:900;color:white}
  .top .sub{font-size:12px;opacity:.8;color:white}
  .top-actions{margin-left:auto;display:flex;gap:8px}
  .btn{background:rgba(255,255,255,.15);color:white;border:none;border-radius:8px;
    padding:7px 14px;cursor:pointer;font-size:12px;font-weight:700;transition:background .15s;font-family:inherit}
  .btn:hover{background:rgba(255,255,255,.25)}
  .btn.danger{background:#dc3545} .btn.danger:hover{background:#c82333}
  .btn.sm{padding:3px 9px;font-size:11px}
  .stats{display:flex;gap:16px;padding:20px 32px;flex-wrap:wrap;background:#13182a;border-bottom:1px solid #2a3050}
  .stat{background:#1a1f35;border:1px solid #2a3050;border-radius:12px;padding:14px 22px;min-width:120px}
  .stat-n{font-size:28px;font-weight:900;color:#7c5cbf}
  .stat-l{font-size:11px;color:#7a8fa6;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
  .tabs{display:flex;padding:0 32px;border-bottom:1px solid #2a3050;background:#13182a}
  .tab{padding:12px 20px;cursor:pointer;font-size:13px;font-weight:700;color:#7a8fa6;border-bottom:2px solid transparent;transition:all .15s}
  .tab.active{color:#7c5cbf;border-bottom-color:#7c5cbf} .tab:hover{color:#e8edf5}
  .section{padding:20px 32px;overflow-x:auto;display:none} .section.visible{display:block}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:10px 12px;background:#1a1f35;color:#7a8fa6;font-weight:800;
    text-transform:uppercase;font-size:10px;letter-spacing:.5px;border-bottom:1px solid #2a3050}
  td{padding:10px 12px;border-bottom:1px solid #1a1f35;color:#c8d0e0;vertical-align:top;max-width:260px;word-break:break-word}
  tr:hover td{background:#131824}
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:800}
  .badge.online{background:#2dd4a020;color:#2dd4a0;border:1px solid #2dd4a040}
  .badge.offline{background:#ffffff10;color:#7a8fa6;border:1px solid #ffffff15}
  .badge.deleted{background:#dc354520;color:#dc3545;border:1px solid #dc354540}
  .badge.active{background:#7c5cbf20;color:#7c5cbf;border:1px solid #7c5cbf40}
  .empty{text-align:center;padding:60px;color:#7a8fa6;font-size:14px}
  .err{background:#dc354515;border:1px solid #dc354540;color:#dc3545;padding:12px 20px;border-radius:8px;margin:16px 32px;font-size:13px}
  @media(max-width:600px){.section,.stats{padding:12px}.top{padding:12px 16px}.tabs{padding:0 8px}.tab{padding:10px 12px;font-size:12px}}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">HD</div>
    <div class="login-title">Admin Access</div>
    <div class="login-sub">Enter your admin key to continue</div>
    <div class="login-error" id="loginError">❌ Wrong admin key. Try again.</div>
    <input class="login-input" type="password" id="keyInput"
      placeholder="Admin key..." autocomplete="off"
      onkeydown="if(event.key==='Enter')tryLogin()"/>
    <button class="login-btn" onclick="tryLogin()">🔐 Sign In</button>
    <div class="login-hint">Set your key in server/.env → ADMIN_KEY</div>
  </div>
</div>

<div id="adminPanel">
  <div class="top">
    <div class="top-logo">HD</div>
    <div><h1>Database Admin</h1><div class="sub">HD Messenger — manage users &amp; messages</div></div>
    <div class="top-actions">
      <button class="btn" onclick="loadAll()">↻ Refresh</button>
      <button class="btn" onclick="location.href='/'">← App</button>
      <button class="btn" onclick="logout()">🔒 Lock</button>
    </div>
  </div>
  <div id="errorBar" class="err" style="display:none"></div>
  <div class="stats" id="statsRow">
    <div class="stat"><div class="stat-n">—</div><div class="stat-l">Users</div></div>
    <div class="stat"><div class="stat-n">—</div><div class="stat-l">Messages</div></div>
    <div class="stat"><div class="stat-n">—</div><div class="stat-l">Groups</div></div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="showTab('users',this)">👤 Users</div>
    <div class="tab" onclick="showTab('messages',this)">💬 Messages</div>
  </div>
  <div class="section visible" id="users"></div>
  <div class="section" id="messages"></div>
</div>

<script>
let adminKey = '';

function tryLogin() {
  const val = document.getElementById('keyInput').value.trim();
  if (!val) return;
  fetch('/api/admin/stats?key=' + encodeURIComponent(val))
    .then(r => { if(r.status===401) throw new Error('wrong'); return r.json(); })
    .then(() => {
      adminKey = val;
      sessionStorage.setItem('hd_admin_key', adminKey);
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      loadAll();
    })
    .catch(() => {
      const err = document.getElementById('loginError');
      err.style.display = 'block';
      document.getElementById('keyInput').value = '';
      document.getElementById('keyInput').focus();
      setTimeout(() => err.style.display = 'none', 3000);
    });
}

function logout() {
  sessionStorage.removeItem('hd_admin_key');
  adminKey = '';
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('keyInput').value = '';
}

async function apiFetch(url) {
  const r = await fetch(url + '?key=' + encodeURIComponent(adminKey));
  if (r.status === 401) { logout(); throw new Error('Session expired'); }
  if (!r.ok) { const d = await r.json(); throw new Error(d.error || r.status); }
  return r.json();
}

function showErr(msg) {
  const el = document.getElementById('errorBar');
  el.textContent = '❌ ' + msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}

function showTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('users').classList.toggle('visible', name === 'users');
  document.getElementById('messages').classList.toggle('visible', name === 'messages');
}

async function loadAll() {
  try {
    const [stats, users, messages] = await Promise.all([
      apiFetch('/api/admin/stats'),
      apiFetch('/api/admin/users'),
      apiFetch('/api/admin/messages'),
    ]);

    document.getElementById('statsRow').innerHTML = `
      <div class="stat"><div class="stat-n">${stats.users||0}</div><div class="stat-l">Users</div></div>
      <div class="stat"><div class="stat-n">${stats.messages||0}</div><div class="stat-l">Messages</div></div>
      <div class="stat"><div class="stat-n">${stats.groups||0}</div><div class="stat-l">Groups</div></div>`;

    document.getElementById('users').innerHTML = users.length ? `
      <table><thead><tr>
        <th>#</th><th>Name</th><th>Email</th><th>Status</th><th>Online</th><th>Joined</th><th>Action</th>
      </tr></thead><tbody>
      ${users.map(u=>`<tr>
        <td style="color:#3a4060">${u.id}</td>
        <td><strong>${esc(u.name)}</strong></td>
        <td style="color:#7a8fa6">${esc(u.email)}</td>
        <td style="color:#7a8fa6;font-size:12px">${esc((u.status||'—').slice(0,40))}</td>
        <td><span class="badge ${u.online?'online':'offline'}">${u.online?'● Online':'Offline'}</span></td>
        <td style="white-space:nowrap;font-size:12px;color:#7a8fa6">${fmtDate(u.created_at)}</td>
        <td><button class="btn sm danger" onclick="deleteUser('${esc(u.uid)}','${esc(u.name)}')">Delete</button></td>
      </tr>`).join('')}
      </tbody></table>` : '<div class="empty">No users yet</div>';

    document.getElementById('messages').innerHTML = messages.length ? `
      <table><thead><tr>
        <th>#</th><th>From</th><th>Room</th><th>Message</th><th>Type</th><th>Status</th><th>Time</th>
      </tr></thead><tbody>
      ${messages.map(m=>`<tr>
        <td style="color:#3a4060">${m.id}</td>
        <td><strong>${esc(m.sender_name)}</strong></td>
        <td style="font-size:11px;color:#7a8fa6">${esc(m.room_id)}</td>
        <td>${esc(m.text||'')}</td>
        <td><span class="badge active">${m.type}</span></td>
        <td>${m.deleted?'<span class="badge deleted">Deleted</span>':'<span class="badge online">Active</span>'}</td>
        <td style="white-space:nowrap;font-size:12px;color:#7a8fa6">${fmtDate(m.created_at)}</td>
      </tr>`).join('')}
      </tbody></table>` : '<div class="empty">No messages yet</div>';

  } catch(e) { showErr(e.message); }
}

async function deleteUser(uid, name) {
  if (!confirm(`Delete user "${name}"?\n\nThis cannot be undone.`)) return;
  try {
    const r = await fetch(`/api/admin/users/${uid}?key=${encodeURIComponent(adminKey)}`,{method:'DELETE'});
    if (!r.ok) throw new Error('Delete failed');
    loadAll();
  } catch(e) { showErr(e.message); }
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(d){return d?new Date(d).toLocaleString():'—';}

// Restore session if tab was refreshed
const saved = sessionStorage.getItem('hd_admin_key');
if (saved) {
  adminKey = saved;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  loadAll();
}

// Auto-login if key is in URL ?key=...
const urlKey = new URLSearchParams(window.location.search).get('key');
if (urlKey && !saved) {
  adminKey = urlKey;
  sessionStorage.setItem('hd_admin_key', adminKey);
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  loadAll();
}
</script>
</body>
</html>
